<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G-Energy — Онлайн подбор масла</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .chat-container {
            width: 100%;
            max-width: 500px;
            height: 700px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }
        .chat-header h1 { font-size: 20px; margin-bottom: 5px; }
        .chat-header p { font-size: 13px; opacity: 0.9; }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }
        .message {
            margin-bottom: 15px;
            max-width: 85%;
        }
        .message-bot {
            margin-right: auto;
        }
        .message-user {
            margin-left: auto;
        }
        .message-bubble {
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.5;
        }
        .message-bot .message-bubble {
            background: white;
            color: #333;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .message-user .message-bubble {
            background: #667eea;
            color: white;
            border-bottom-right-radius: 4px;
        }
        .quick-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }
        .quick-btn {
            padding: 8px 16px;
            background: #e8f0fe;
            color: #667eea;
            border: none;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .quick-btn:hover {
            background: #667eea;
            color: white;
        }
        .chat-input {
            padding: 15px 20px;
            background: white;
            border-top: 1px solid #e9ecef;
            display: flex;
            gap: 10px;
        }
        .chat-input input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 25px;
            font-size: 14px;
            outline: none;
        }
        .chat-input input:focus {
            border-color: #667eea;
        }
        .send-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: #667eea;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 18px;
            transition: all 0.2s;
        }
        .send-btn:hover {
            background: #5a6fd6;
        }
        .typing {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 10px 15px;
            background: white;
            border-radius: 18px;
            width: fit-content;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .typing-dot {
            width: 8px;
            height: 8px;
            background: #667eea;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-10px); }
        }
        .product-card {
            background: white;
            border-radius: 12px;
            padding: 15px;
            margin: 10px 0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .product-name { font-weight: 600; color: #333; margin-bottom: 5px; }
        .product-price { font-size: 18px; color: #667eea; font-weight: 700; }
        .product-stock { font-size: 12px; color: #28a745; margin-top: 5px; }
        .vin-input {
            background: #e8f0fe;
            padding: 15px;
            border-radius: 12px;
            margin: 10px 0;
        }
        .vin-input input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            text-transform: uppercase;
        }
        .result-box {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            border-radius: 12px;
            padding: 15px;
            margin: 10px 0;
        }
        .result-box h4 { color: #155724; margin-bottom: 10px; }
        .result-box p { color: #155724; font-size: 13px; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1>🛢️ G-Energy Подбор масла</h1>
            <p>Онлайн-консультант по моторным маслам</p>
        </div>
        
        <div class="chat-messages" id="chatMessages">
            <!-- Приветствие -->
            <div class="message message-bot">
                <div class="message-bubble">
                    👋 Здравствуйте! Я помогу подобрать идеальное масло для вашего автомобиля.
                    <br><br>
                    Какой способ подбора удобнее?
                </div>
                <div class="quick-buttons">
                    <button class="quick-btn" onclick="selectMethod('vin')">🔍 По VIN-номеру</button>
                    <button class="quick-btn" onclick="selectMethod('auto')">🚗 По марке авто</button>
                    <button class="quick-btn" onclick="selectMethod('oil')">🛢️ По типу масла</button>
                    <button class="quick-btn" onclick="selectMethod('consult')">💬 Консультация</button>
                </div>
            </div>
        </div>
        
        <div class="chat-input">
            <input type="text" id="messageInput" placeholder="Введите сообщение..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button class="send-btn" onclick="sendMessage()">➤</button>
        </div>
    </div>

    <script>
        const chatMessages = document.getElementById('chatMessages');
        const messageInput = document.getElementById('messageInput');
        
        function addMessage(text, sender) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message message-${sender}`;
            msgDiv.innerHTML = `<div class="message-bubble">${text}</div>`;
            chatMessages.appendChild(msgDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
        
        function showTyping() {
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message message-bot typing-indicator';
            typingDiv.innerHTML = `
                <div class="typing">
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                </div>`;
            chatMessages.appendChild(typingDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            return typingDiv;
        }
        
        function removeTyping() {
            const typing = document.querySelector('.typing-indicator');
            if (typing) typing.remove();
        }
        
        function selectMethod(method) {
            let userText = '';
            let botResponse = '';
            let buttons = '';
            
            switch(method) {
                case 'vin':
                    userText = '🔍 Подбор по VIN-номеру';
                    botResponse = 'Отлично! Введите VIN-номер вашего автомобиля (17 символов).\u003cbr>\u003cbr>Например: XWB3K32EDFA123456';
                    buttons = `<div class="vin-input">
                        <input type="text" id="vinInput" placeholder="Введите VIN" maxlength="17">
                        <button class="quick-btn" onclick="checkVIN()" style="margin-top:10px;width:100%">Подобрать масло</button>
                    </div>`;
                    break;
                    
                case 'auto':
                    userText = '🚗 Подбор по марке авто';
                    botResponse = 'Выберите марку вашего автомобиля:';
                    buttons = `<div class="quick-buttons">
                        <button class="quick-btn" onclick="selectBrand('Toyota')">Toyota</button>
                        <button class="quick-btn" onclick="selectBrand('BMW')">BMW</button>
                        <button class="quick-btn" onclick="selectBrand('VW')">Volkswagen</button>
                        <button class="quick-btn" onclick="selectBrand('Ford')">Ford</button>
                        <button class="quick-btn" onclick="selectBrand('Lada')">Lada</button>
                        <button class="quick-btn" onclick="selectBrand('Other')">Другая...</button>
                    </div>`;
                    break;
                    
                case 'oil':
                    userText = '🛢️ Подбор по типу масла';
                    botResponse = 'Какое масло вам нужно?';
                    buttons = `<div class="quick-buttons">
                        <button class="quick-btn" onclick="selectOil('5W-30')">5W-30 (универсальное)</button>
                        <button class="quick-btn" onclick="selectOil('5W-40')">5W-40 (для пробега 100к+)</button>
                        <button class="quick-btn" onclick="selectOil('0W-20')">0W-20 (экономичное)</button>
                        <button class="quick-btn" onclick="selectOil('10W-40')">10W-40 (для жаркого климата)</button>
                    </div>`;
                    break;
                    
                case 'consult':
                    userText = '💬 Нужна консультация';
                    botResponse = 'Задайте ваш вопрос. Например:\u003cbr>• Какое масло лучше для зимы?\u003cbr>• Чем синтетика отличается от полусинтетики?\u003cbr>• Как часто менять масло?';
                    break;
            }
            
            addMessage(userText, 'user');
            
            const typing = showTyping();
            setTimeout(() => {
                removeTyping();
                addMessage(botResponse + buttons, 'bot');
            }, 1000);
        }
        
        function checkVIN() {
            const vin = document.getElementById('vinInput').value.toUpperCase();
            if (vin.length !== 17) {
                alert('VIN должен содержать 17 символов');
                return;
            }
            
            addMessage('🔍 Проверяю VIN: ' + vin, 'user');
            const typing = showTyping();
            
            setTimeout(() => {
                removeTyping();
                
                // Имитация результата
                const result = `<div class="result-box">
                    <h4>✅ Автомобиль найден</h4>
                    <p><strong>Toyota Fortuner 2018</strong></p>
                    <p>Двигатель: 2.7L 1TR-FE</p>
                    <p>Рекомендуемое масло: <strong>G-Energy Synthetic Active 5W-30</strong></p>
                    <p>Объём: 5.5 литров</p>
                </div>
                <div class="product-card">
                    <div class="product-name">G-Energy Synthetic Active 5W-30</div>
                    <div class="product-price">45 000 ₽/бочка (205л)</div>
                    <div class="product-stock">✅ В наличии: 50 бочек</div>
                    <button class="quick-btn" onclick="orderProduct()" style="margin-top:10px;width:100%">🛒 Оформить заказ</button>
                </div>`;
                
                addMessage(result, 'bot');
            }, 2000);
        }
        
        function selectBrand(brand) {
            addMessage(brand, 'user');
            const typing = showTyping();
            
            setTimeout(() => {
                removeTyping();
                
                const responses = {
                    'Toyota': 'Toyota обычно требует масло 0W-20 или 5W-30. Уточните модель и год для точного подбора.',
                    'BMW': 'BMW требует спецификацию LL-04. Рекомендуем G-Energy Professional 5W-30.',
                    'VW': 'Volkswagen требует VW 504/00. Подойдёт G-Energy Synthetic 5W-30.',
                    'Ford': 'Ford обычно использует 5W-30. Уточните двигатель для точного подбора.',
                    'Lada': 'Для Lada рекомендуем G-Energy Expert 10W-40 или 5W-40.',
                    'Other': 'Укажите марку и модель в сообщении, я подберу масло.'
                };
                
                addMessage(responses[brand] || 'Уточните данные автомобиля.', 'bot');
            }, 1000);
        }
        
        function selectOil(viscosity) {
            addMessage(viscosity, 'user');
            const typing = showTyping();
            
            setTimeout(() => {
                removeTyping();
                
                const products = {
                    '5W-30': {
                        name: 'G-Energy Synthetic Active 5W-30',
                        price: '45 000 ₽',
                        desc: 'Универсальное масло для большинства современных двигателей'
                    },
                    '5W-40': {
                        name: 'G-Energy Professional 10W-40',
                        price: '38 000 ₽',
                        desc: 'Для двигателей с пробегом более 100 000 км'
                    },
                    '0W-20': {
                        name: 'G-Energy Synthetic 0W-20',
                        price: '47 000 ₽',
                        desc: 'Для экономии топлива и гибридов'
                    },
                    '10W-40': {
                        name: 'G-Energy Truck 15W-40',
                        price: '32 000 ₽',
                        desc: 'Для жаркого климата и тяжёлых условий'
                    }
                };
                
                const p = products[viscosity];
                const result = `<div class="product-card">
                    <div class="product-name">${p.name}</div>
                    <div class="product-price">${p.price}/бочка</div>
                    <p style="margin-top:10px;color:#666;font-size:13px;">${p.desc}</p>
                    <button class="quick-btn" onclick="orderProduct()" style="margin-top:10px;width:100%">🛒 Оформить заказ</button>
                </div>`;
                
                addMessage(result, 'bot');
            }, 1000);
        }
        
        function orderProduct() {
            addMessage('🛒 Хочу оформить заказ', 'user');
            const typing = showTyping();
            
            setTimeout(() => {
                removeTyping();
                addMessage('Отлично! Для оформления заказа нужны ваши контактные данные.\u003cbr\u003e\u003cbr\u003eВведите:\u003cbr\u003e1. Название компании\u003cbr\u003e2. ИНН\u003cbr\u003e3. Контактный телефон\u003cbr\u003e4. Email\u003cbr\u003e\u003cbr\u003eИли позвоните нам: +7 (XXX) XXX-XX-XX', 'bot');
            }, 1000);
        }
        
        function sendMessage() {
            const text = messageInput.value.trim();
            if (!text) return;
            
            addMessage(text, 'user');
            messageInput.value = '';
            
            const typing = showTyping();
            
            setTimeout(() => {
                removeTyping();
                
                // Простой ответ на произвольное сообщение
                const responses = [
                    'Понял вас! Давайте уточним детали. Выберите способ подбора масла выше.',
                    'Для точного подбора рекомендую использовать VIN-номер или указать марку автомобиля.',
                    'Могу помочь с выбором! Какой у вас автомобиль?',
                    'Наши менеджеры готовы проконсультировать. Оставьте номер телефона — перезвоним.'
                ];
                
                const randomResponse = responses[Math.floor(Math.random() * responses.length)];
                addMessage(randomResponse, 'bot');
            }, 1500);
        }
    </script>
</body>
</html>
